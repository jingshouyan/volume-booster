<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 220px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h2 {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 600;
      color: #e0e0e0;
    }
    .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 12px;
    }
    .boost-value {
      font-size: 42px;
      font-weight: 700;
      color: #4fc3f7;
      margin: 4px 0;
      line-height: 1.1;
    }
    input[type="range"] {
      width: 100%;
      margin: 8px 0 4px;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #333;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4fc3f7;
      cursor: pointer;
      border: 2px solid #1a1a2e;
    }
    .label {
      font-size: 11px;
      color: #666;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h2>Volume Booster</h2>
  <div class="subtitle">Boost beyond 100%</div>
  <div class="boost-value" id="boostValue">1.0x</div>
  <input type="range" id="slider" min="1" max="5" step="0.1" value="1">
  <div class="label">Drag to adjust boost level</div>
  <script src="popup.js"></script>
</body>
</html>
