<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h2 {
      margin: 0 0 4px;
      font-size: 15px;
      font-weight: 600;
      color: #e0e0e0;
    }
    .subtitle {
      font-size: 11px;
      color: #888;
      margin-bottom: 12px;
    }
    .boost-value {
      font-size: 42px;
      font-weight: 700;
      color: #4fc3f7;
      margin: 4px 0;
      line-height: 1.1;
    }
    input[type="range"] {
      width: 100%;
      margin: 8px 0 12px;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #333;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4fc3f7;
      cursor: pointer;
      border: 2px solid #1a1a2e;
    }
    .label {
      font-size: 11px;
      color: #666;
      margin-bottom: 14px;
    }

    /* Toggle switch */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid #333;
      font-size: 13px;
      color: #ccc;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #555;
      border-radius: 22px;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider {
      background: #4fc3f7;
    }
    .toggle input:checked + .slider::before {
      transform: translateX(18px);
    }
    .toggle-label {
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Volume Booster</h2>
  <div class="subtitle">Boost beyond 100%</div>
  <div class="boost-value" id="boostValue">1.0x</div>
  <input type="range" id="slider" min="1" max="5" step="0.1" value="1">
  <div class="label">Drag to adjust boost level</div>

  <div class="toggle-row">
    <label class="toggle">
      <input type="checkbox" id="protectionToggle" checked>
      <span class="slider"></span>
    </label>
    <span class="toggle-label" id="protectionLabel">Quality Protection</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
